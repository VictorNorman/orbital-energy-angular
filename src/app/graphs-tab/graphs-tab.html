<div class="graphs-tab">
  <div class="y-choice-and-chart-container">

    <mat-card class="axis-card">
      <mat-card-header>
        <mat-card-title>Y Axis</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-radio-group class="axis-radio-group" [value]="yChoice()" (change)="yChoice.set($event.value)">
          @for (choice of graphChoices; track choice.value) {
            <mat-radio-button [value]="choice.value">{{ choice.label }}</mat-radio-button>
          }
        </mat-radio-group>
      </mat-card-content>
    </mat-card>

    <div class="subchoice-and-chart">
      <app-graph-sub-choice
        xOrY="y"
        [graphChoice]="yChoice()"
        [(methodOrbChecked)]="yMethodOrb"
        [(ionizationChecked)]="yIonization"
        [(electroNegChecked)]="yElectroNeg"
        [(atomicRadChecked)]="yAtomicRad"
      />
      <div id="chart-attachment">
        <canvas #chartCanvas></canvas>
      </div>
    </div>
  </div>

  <!-- Element range slider -->
  <mat-card class="range-card">
    <mat-card-header>
      <mat-card-title>Element Range (Z = {{ fromVal() }} – {{ toVal() }})</mat-card-title>
    </mat-card-header>
    <mat-card-content class="range-card-content">
      <mat-slider min="1" max="118" step="1" class="range-slider">
        <input matSliderStartThumb [value]="fromVal()" (valueChange)="onFromSlider($event.toString())" />
        <input matSliderEndThumb [value]="toVal()" (valueChange)="onToSlider($event.toString())" />
      </mat-slider>
      <div class="range-inputs">
        <mat-form-field appearance="outline" class="range-input-field">
          <mat-label>From</mat-label>
          <input matInput type="number" min="1" max="118" [value]="fromVal()" (change)="onFromInput($any($event.target).value)" />
        </mat-form-field>
        <mat-form-field appearance="outline" class="range-input-field">
          <mat-label>To</mat-label>
          <input matInput type="number" min="1" max="118" [value]="toVal()" (change)="onToInput($any($event.target).value)" />
        </mat-form-field>
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card class="axis-card">
    <mat-card-header>
      <mat-card-title>X Axis</mat-card-title>
    </mat-card-header>
    <mat-card-content class="x-row">
      <mat-radio-group class="axis-radio-group" [value]="xChoice()" (change)="xChoice.set($event.value)">
        @for (choice of graphChoices; track choice.value) {
          <mat-radio-button [value]="choice.value">{{ choice.label }}</mat-radio-button>
        }
      </mat-radio-group>
      <app-graph-sub-choice
        xOrY="x"
        [graphChoice]="xChoice()"
        [(methodOrbChecked)]="xMethodOrb"
        [(ionizationChecked)]="xIonization"
        [(electroNegChecked)]="xElectroNeg"
        [(atomicRadChecked)]="xAtomicRad"
      />
    </mat-card-content>
  </mat-card>
</div>
