<div class="elements-table wrapper">
  <div class="innerTop">
    <div class="elements">
      @for (row of rows; track $index) {
        <div class="row clickable">
          @for (cell of row; track $index) {
            @if (cell.kind === 'elem') {
              <a
                [class]="'element ptable2 ' + cell.group + ' ' + (cell.rowCls ?? '') + (isSelected(cell) ? ' clicked' : '')"
                (click)="onElementClick(cell)"
              >{{ cell.symbol }}<br />{{ cell.number }}</a>
            } @else {
              <div class="element empty-element"></div>
            }
          }
        </div>
      }
    </div>
    <app-detailed-elem-box />
  </div>
</div>
